<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kodovye Market • Отзывы</title>
  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <style>
    :root {
      --bg: #121317;
      --bg-soft: #1a1d24;
      --line: rgba(255, 255, 255, 0.12);
      --line-soft: rgba(255, 255, 255, 0.08);
      --text: #f2f4f8;
      --muted: #a8afbf;
      --good: #89e3b0;
      --bad: #ff9b9b;
      --mid: #f1d39a;
      --accent: #cfd5e3;
      --safe-top: 0px;
      --safe-top-fallback: env(safe-area-inset-top, 0px);
      --safe-right: 0px;
      --safe-bottom: 0px;
      --safe-left: 0px;
      --app-height: 100vh;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: "SF Pro Text", "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(980px 420px at -15% -10%, rgba(255, 255, 255, 0.12), transparent 55%),
        radial-gradient(720px 360px at 120% -10%, rgba(255, 255, 255, 0.08), transparent 50%),
        linear-gradient(165deg, #0f1014 0%, #151821 44%, #1a1f2a 100%);
    }

    body {
      min-height: var(--app-height);
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding:
        calc(16px + max(var(--safe-top), var(--safe-top-fallback)))
        calc(12px + var(--safe-right))
        calc(18px + var(--safe-bottom))
        calc(12px + var(--safe-left));
    }

    .head {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      background:
        linear-gradient(150deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.03)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(0, 0, 0, 0.15));
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(4px);
    }

    .title {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.4;
      font-size: 14px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
      margin-top: 12px;
    }

    .card {
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      padding: 10px;
      background:
        linear-gradient(170deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.02)),
        var(--bg-soft);
      min-height: 72px;
    }

    .k {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 3px;
    }

    .v {
      font-size: 19px;
      font-weight: 760;
      letter-spacing: 0.1px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 12px 0;
    }

    .tab {
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        #1f232c;
      color: var(--text);
      padding: 9px 10px;
      min-height: 38px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      min-width: 0;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .tab-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tab.active {
      border-color: rgba(255, 255, 255, 0.34);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.04)),
        #2a303b;
      color: #ffffff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    .list {
      border: 1px solid var(--line-soft);
      border-radius: 13px;
      background:
        linear-gradient(165deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
        var(--bg-soft);
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
    }

    .row {
      padding: 12px;
      border-bottom: 1px solid var(--line-soft);
    }

    .row:last-child {
      border-bottom: none;
    }

    .line1 {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .line2 {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      align-items: center;
    }

    .meta-left {
      display: inline-flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      min-width: 0;
    }

    .product-chip {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.06);
      padding: 3px 9px;
      color: #d4d9e6;
      font-weight: 600;
      text-decoration: none;
    }

    .product-chip a {
      color: inherit;
      text-decoration: none;
      border: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: min(58vw, 320px);
      display: inline-block;
    }

    .item-chip {
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.03);
      padding: 2px 8px;
      color: #c4cad9;
      font-size: 12px;
      font-weight: 650;
    }

    .line3 {
      margin-top: 7px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.4;
      font-size: 13px;
    }

    .post-link {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px dashed rgba(207, 213, 227, 0.52);
    }

    .post-link:hover {
      border-bottom-color: rgba(207, 213, 227, 0.95);
    }

    .media {
      margin-top: 8px;
      border: 1px solid var(--line-soft);
      border-radius: 10px;
      padding: 7px 8px;
      background: rgba(255, 255, 255, 0.04);
    }

    .media summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      user-select: none;
      list-style: none;
    }

    .media summary::-webkit-details-marker {
      display: none;
    }

    .media summary::before {
      content: "> ";
      color: #d4d9e8;
    }

    .media[open] summary::before {
      content: "v ";
    }

    .media img {
      display: block;
      width: auto;
      max-width: 100%;
      max-height: min(68vh, 560px);
      object-fit: contain;
      border-radius: 8px;
      margin: 8px auto 0;
      cursor: zoom-in;
      image-rendering: auto;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: rgba(7, 9, 12, 0.9);
      backdrop-filter: blur(4px);
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 22px 44px rgba(0, 0, 0, 0.45);
    }

    .lightbox-close {
      position: absolute;
      top: 10px;
      right: 10px;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: #f3f6ff;
      padding: 8px 11px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }

    .badge {
      font-weight: 700;
      text-transform: lowercase;
    }

    .badge.good { color: var(--good); }
    .badge.bad { color: var(--bad); }
    .badge.mid { color: var(--mid); }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 760px) {
      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .line1, .line2 {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }
    }

    @media (max-width: 460px) {
      .metrics {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1 class="title">Kodovye Market • Отзывы</h1>
      <p class="sub">Глянцевая витрина отзывов: карточки сделок, товар и фото из поста.</p>
      <div class="metrics">
        <div class="card"><div class="k">Все отзывы</div><div class="v" id="mAll">0</div></div>
        <div class="card"><div class="k">Позитивные</div><div class="v" id="mPos">0</div></div>
        <div class="card"><div class="k">Негативные</div><div class="v" id="mNeg">0</div></div>
        <div class="card"><div class="k">Доля позитива</div><div class="v" id="mRate">0%</div></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-filter="all"><span class="tab-label">Все</span></button>
      <button class="tab" data-filter="positive"><span class="tab-label">Позитив</span></button>
      <button class="tab" data-filter="negative"><span class="tab-label">Негатив</span></button>
      <button class="tab" data-filter="neutral"><span class="tab-label">Нейтрал</span></button>
    </div>

    <div class="list" id="reviewsList"></div>
    <div class="status" id="statusLine">Загрузка...</div>
  </div>
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox-close" id="lightboxClose" type="button">Закрыть</button>
    <img id="lightboxImg" alt="Полное фото" />
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    let currentFilter = "all";
    let rows = [];
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightboxImg");
    const lightboxClose = document.getElementById("lightboxClose");

    function esc(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function fmtDate(iso) {
      if (!iso) return "-";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return String(iso);
      return d.toLocaleString("ru-RU", { hour12: false });
    }

    function setCssVar(name, value) {
      if (!value) return;
      document.documentElement.style.setProperty(name, String(value));
    }

    function applyTelegramTheme() {
      if (!tg) return;
      const p = tg.themeParams || {};
      setCssVar("--bg", p.bg_color || "#121317");
      setCssVar("--bg-soft", p.secondary_bg_color || "#1a1d24");
      setCssVar("--text", p.text_color || "#f2f4f8");
      setCssVar("--muted", p.hint_color || "#a8afbf");
      setCssVar("--accent", p.accent_text_color || "#cfd5e3");
      if (p.destructive_text_color) setCssVar("--bad", p.destructive_text_color);

      try { tg.setHeaderColor("secondary_bg_color"); } catch (_) {}
      try { tg.setBackgroundColor("bg_color"); } catch (_) {}
      try {
        if (tg.isVersionAtLeast && tg.isVersionAtLeast("7.10")) {
          tg.setBottomBarColor("secondary_bg_color");
        }
      } catch (_) {}
      try {
        if (tg.MainButton && tg.MainButton.setParams) {
          tg.MainButton.setParams({
            color: p.button_color || "#676d79",
            text_color: p.button_text_color || "#ffffff",
          });
        }
      } catch (_) {}
      try {
        if (tg.SecondaryButton && tg.SecondaryButton.setParams) {
          tg.SecondaryButton.setParams({
            color: p.secondary_bg_color || "#2f3340",
            text_color: p.text_color || "#f2f4f8",
          });
        }
      } catch (_) {}
    }

    function applyTelegramViewport() {
      if (!tg) return;
      const contentInset = tg.contentSafeAreaInset || tg.safeAreaInset || {};
      const rawTop = Number(contentInset.top || 0);
      const iosFallbackTop = (tg.platform === "ios" && rawTop < 18) ? 34 : 0;
      setCssVar("--safe-top", `${Math.max(rawTop, iosFallbackTop)}px`);
      setCssVar("--safe-right", `${Number(contentInset.right || 0)}px`);
      setCssVar("--safe-bottom", `${Number(contentInset.bottom || 0)}px`);
      setCssVar("--safe-left", `${Number(contentInset.left || 0)}px`);

      const h = Number(tg.viewportStableHeight || tg.viewportHeight || 0);
      if (h > 0) setCssVar("--app-height", `${h}px`);
    }

    function telegramHapticSelection() {
      try { tg?.HapticFeedback?.selectionChanged?.(); } catch (_) {}
    }

    function telegramHapticImpact() {
      try { tg?.HapticFeedback?.impactOccurred?.("light"); } catch (_) {}
    }

    function openLightbox(url) {
      const src = String(url || "").trim();
      if (!src || !lightbox || !lightboxImg) return;
      lightboxImg.src = src;
      lightbox.classList.add("open");
      lightbox.setAttribute("aria-hidden", "false");
      try { tg?.BackButton?.show?.(); } catch (_) {}
    }

    function closeLightbox() {
      if (!lightbox || !lightboxImg) return;
      lightbox.classList.remove("open");
      lightbox.setAttribute("aria-hidden", "true");
      lightboxImg.src = "";
      if (currentFilter === "all") {
        try { tg?.BackButton?.hide?.(); } catch (_) {}
      }
    }

    function setFilter(nextFilter) {
      currentFilter = nextFilter || "all";
      document.querySelectorAll(".tab").forEach((x) => {
        const isActive = (x.dataset.filter || "all") === currentFilter;
        x.classList.toggle("active", isActive);
      });
      updateTelegramButtons();
      renderRows();
    }

    function updateTelegramButtons() {
      if (!tg) return;
      const isRoot = currentFilter === "all";

      try {
        if (isRoot) tg.BackButton.hide();
        else tg.BackButton.show();
      } catch (_) {}

      try {
        if (tg.SecondaryButton && tg.SecondaryButton.setParams) {
          tg.SecondaryButton.setParams({
            text: isRoot ? "Закрыть" : "Сбросить фильтр",
            is_visible: true,
            position: "left",
          });
        } else if (tg.SecondaryButton) {
          tg.SecondaryButton.setText(isRoot ? "Закрыть" : "Сбросить фильтр");
          tg.SecondaryButton.show();
        }
      } catch (_) {}
    }

    function initTelegramMiniApp() {
      if (!tg) return;
      tg.ready();
      tg.expand();
      applyTelegramTheme();
      applyTelegramViewport();

      try {
        const p = tg.themeParams || {};
        if (tg.MainButton && tg.MainButton.setParams) {
          tg.MainButton.setParams({
            text: "Обновить",
            is_visible: true,
            color: p.button_color || "#676d79",
            text_color: p.button_text_color || "#ffffff",
          });
        } else if (tg.MainButton) {
          tg.MainButton.setText("Обновить");
          tg.MainButton.show();
        }
      } catch (_) {}
      updateTelegramButtons();
      try {
        if (tg.isVersionAtLeast && tg.isVersionAtLeast("7.7")) {
          tg.enableVerticalSwipes();
        }
      } catch (_) {}
      try {
        if (tg.isVersionAtLeast && tg.isVersionAtLeast("8.0") && !tg.isFullscreen) {
          tg.requestFullscreen();
        }
      } catch (_) {}
      try {
        tg.onEvent("themeChanged", applyTelegramTheme);
        tg.onEvent("viewportChanged", applyTelegramViewport);
        tg.onEvent("safeAreaChanged", applyTelegramViewport);
        tg.onEvent("contentSafeAreaChanged", applyTelegramViewport);
        tg.onEvent("fullscreenChanged", applyTelegramViewport);
        tg.onEvent("activated", fetchData);
        tg.onEvent("backButtonClicked", () => {
          if (lightbox && lightbox.classList.contains("open")) {
            closeLightbox();
            return;
          }
          if (currentFilter === "all") {
            try { tg.close(); } catch (_) {}
            return;
          }
          telegramHapticSelection();
          setFilter("all");
        });
        tg.onEvent("secondaryButtonClicked", () => {
          if (lightbox && lightbox.classList.contains("open")) {
            closeLightbox();
            return;
          }
          telegramHapticSelection();
          if (currentFilter === "all") {
            try { tg.close(); } catch (_) {}
            return;
          }
          setFilter("all");
        });
        tg.onEvent("mainButtonClicked", () => {
          telegramHapticImpact();
          fetchData();
        });
      } catch (_) {}
    }

    function renderMetrics(stats) {
      const all = Number(stats.all_reviews || 0);
      const pos = Number(stats.positive_reviews || 0);
      const neg = Number(stats.negative_reviews || 0);
      const rate = Number(stats.positive_rate || 0);
      const neutral = Number(stats.neutral_reviews || 0);

      document.getElementById("mAll").textContent = all.toLocaleString("ru-RU");
      document.getElementById("mPos").textContent = pos.toLocaleString("ru-RU");
      document.getElementById("mNeg").textContent = neg.toLocaleString("ru-RU");
      document.getElementById("mRate").textContent = `${rate.toFixed(2)}%`;

      const neutralTab = document.querySelector('.tab[data-filter="neutral"]');
      if (neutralTab) {
        neutralTab.style.display = neutral > 0 ? "" : "none";
      }
      if (neutral <= 0 && currentFilter === "neutral") {
        setFilter("all");
      }
    }

    function normalizeProductName(value) {
      let text = String(value || "Товар").trim();
      text = text.replace(/[:\s-]*#\d+\s*$/u, "").trim();
      text = text.replace(/\s{2,}/g, " ");
      return text || "Товар";
    }

    function filteredRows() {
      if (currentFilter === "all") return rows;
      return rows.filter((r) => String(r.rating || "") === currentFilter);
    }

    function renderRows() {
      const list = document.getElementById("reviewsList");
      const view = filteredRows();
      if (!view.length) {
        list.innerHTML = '<div class="row"><div class="line3">Записей пока нет.</div></div>';
        return;
      }

      list.innerHTML = view.map((row) => {
        const rating = String(row.rating || "neutral");
        const cls = rating === "positive" ? "good" : (rating === "negative" ? "bad" : "mid");
        const text = String(row.review_text || "").trim();
        const extra = text ? `<div class="line3">${esc(text)}</div>` : "";
        const postUrl = String(row.post_url || "").trim();
        const photoUrl = String(row.photo_url || "").trim();
        const itemId = Number(row.purchase_id || 0);
        const productName = esc(normalizeProductName(row.product_name || "Товар"));
        const productCore = postUrl
          ? `<a class="product-link" href="${esc(postUrl)}" target="_blank" rel="noopener">${productName}</a>`
          : `<span>${productName}</span>`;
        const idHtml = itemId > 0 ? `<span class="item-chip">#${itemId}</span>` : "";
        const media = photoUrl
          ? `<details class="media"><summary>Открыть фото из поста</summary><a class="post-link" href="${esc(photoUrl)}" target="_blank" rel="noopener">Оригинал</a><img class="review-photo" loading="lazy" decoding="async" src="${esc(photoUrl)}" data-photo="${esc(photoUrl)}" alt="Фото к отзыву" /></details>`
          : "";
        return `
          <div class="row">
            <div class="line1">
              <div>${esc(row.user_alias || "Пользователь")}</div>
              <div>${esc(fmtDate(row.created_at))}</div>
            </div>
            <div class="line2">
              <div class="meta-left"><span class="product-chip">${productCore}</span>${idHtml}</div>
              <div class="badge ${cls}">${esc(row.rating_label || rating)}</div>
            </div>
            ${extra}
            ${media}
          </div>`;
      }).join("");

      list.querySelectorAll("img.review-photo").forEach((img) => {
        img.addEventListener("click", (event) => {
          event.preventDefault();
          const src = img.dataset.photo || img.getAttribute("src") || "";
          openLightbox(src);
        });
      });
    }

    function bindTabs() {
      document.querySelectorAll(".tab").forEach((btn) => {
        btn.addEventListener("click", () => {
          telegramHapticSelection();
          setFilter(btn.dataset.filter || "all");
        });
      });
    }

    function bindLightbox() {
      if (!lightbox) return;
      lightbox.addEventListener("click", (event) => {
        if (event.target === lightbox) {
          closeLightbox();
        }
      });
      if (lightboxClose) {
        lightboxClose.addEventListener("click", () => closeLightbox());
      }
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeLightbox();
        }
      });
    }

    async function fetchData() {
      const status = document.getElementById("statusLine");
      status.textContent = "Обновляю...";
      try {
        const response = await fetch(`./reviews.json?ts=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        rows = Array.isArray(payload.items) ? payload.items : [];
        renderMetrics(payload.stats || {});
        renderRows();
        const platform = tg && tg.platform ? ` • ${tg.platform}` : "";
        status.textContent = `Обновлено: ${fmtDate(payload.generated_at)} • Отзывов: ${rows.length}${platform}`;
      } catch (err) {
        status.textContent = `Ошибка загрузки: ${err}`;
      }
    }

    initTelegramMiniApp();
    bindTabs();
    bindLightbox();
    fetchData();
    setInterval(fetchData, 30000);
  </script>
</body>
</html>
