<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kodovye Market • Отзывы</title>
  <script src="https://telegram.org/js/telegram-web-app.js?62"></script>
  <style>
    :root {
      --bg: #1a1b1f;
      --bg-soft: #23252b;
      --line: rgba(255, 255, 255, 0.1);
      --text: #f3f4f7;
      --muted: #a1a6b3;
      --good: #7ee2a8;
      --bad: #ff8f8f;
      --mid: #ffd889;
      --accent: #c5c9d3;
      --safe-top: 0px;
      --safe-right: 0px;
      --safe-bottom: 0px;
      --safe-left: 0px;
      --app-height: 100vh;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(1000px 500px at -10% -10%, rgba(255, 255, 255, 0.07), transparent 55%), var(--bg);
      color: var(--text);
      font-family: "SF Pro Text", "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: var(--app-height);
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding:
        calc(12px + var(--safe-top))
        calc(12px + var(--safe-right))
        calc(18px + var(--safe-bottom))
        calc(12px + var(--safe-left));
    }

    .head {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
    }

    .title {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .sub {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.4;
      font-size: 14px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
      margin-top: 12px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 10px;
      background: var(--bg-soft);
      min-height: 70px;
    }

    .k {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 3px;
    }

    .v {
      font-size: 19px;
      font-weight: 750;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin: 12px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar {
      display: none;
    }

    .tab {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #2a2c33;
      color: var(--text);
      padding: 9px 13px;
      min-height: 38px;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .tab.active {
      border-color: rgba(255, 255, 255, 0.32);
      background: #363942;
      color: #ffffff;
    }

    .list {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg-soft);
      overflow: hidden;
    }

    .row {
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }

    .row:last-child {
      border-bottom: none;
    }

    .line1 {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
      font-weight: 700;
    }

    .line2 {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .line3 {
      margin-top: 7px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.4;
      font-size: 13px;
    }

    .post-link {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px dashed rgba(197, 201, 211, 0.45);
    }

    .post-link:hover {
      border-bottom-color: rgba(197, 201, 211, 0.9);
    }

    .media {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 7px 8px;
      background: rgba(255, 255, 255, 0.02);
    }

    .media summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
      user-select: none;
    }

    .media img {
      display: block;
      width: 100%;
      max-height: 220px;
      object-fit: cover;
      border-radius: 8px;
      margin-top: 8px;
    }

    .badge {
      font-weight: 700;
      text-transform: lowercase;
    }

    .badge.good { color: var(--good); }
    .badge.bad { color: var(--bad); }
    .badge.mid { color: var(--mid); }

    .status {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 760px) {
      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .line1, .line2 {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }
    }

    @media (max-width: 460px) {
      .metrics {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1 class="title">Kodovye Market • Отзывы</h1>
      <p class="sub">Мини-апп в формате Telegram: карточки отзывов с товарами, ссылками и фото.</p>
      <div class="metrics">
        <div class="card"><div class="k">Все отзывы</div><div class="v" id="mAll">0</div></div>
        <div class="card"><div class="k">👍 Позитив</div><div class="v" id="mPos">0</div></div>
        <div class="card"><div class="k">👎 Негатив</div><div class="v" id="mNeg">0</div></div>
        <div class="card"><div class="k">Доля позитива</div><div class="v" id="mRate">0%</div></div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-filter="all">Все</button>
      <button class="tab" data-filter="positive">👍 Позитив</button>
      <button class="tab" data-filter="negative">👎 Негатив</button>
      <button class="tab" data-filter="neutral">🟡 Нейтральные</button>
    </div>

    <div class="list" id="reviewsList"></div>
    <div class="status" id="statusLine">Загрузка...</div>
  </div>

  <script>
    const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
    let currentFilter = "all";
    let rows = [];

    function esc(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function fmtDate(iso) {
      if (!iso) return "-";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return String(iso);
      return d.toLocaleString("ru-RU", { hour12: false });
    }

    function setCssVar(name, value) {
      if (!value) return;
      document.documentElement.style.setProperty(name, String(value));
    }

    function applyTelegramTheme() {
      if (!tg) return;
      const p = tg.themeParams || {};
      setCssVar("--bg", p.bg_color || "#1a1b1f");
      setCssVar("--bg-soft", p.secondary_bg_color || "#23252b");
      setCssVar("--text", p.text_color || "#f3f4f7");
      setCssVar("--muted", p.hint_color || "#a1a6b3");
      setCssVar("--accent", p.accent_text_color || "#c5c9d3");
      if (p.destructive_text_color) setCssVar("--bad", p.destructive_text_color);

      try { tg.setHeaderColor("secondary_bg_color"); } catch (_) {}
      try { tg.setBackgroundColor("bg_color"); } catch (_) {}
      try {
        if (tg.isVersionAtLeast && tg.isVersionAtLeast("7.10")) {
          tg.setBottomBarColor("secondary_bg_color");
        }
      } catch (_) {}
      try {
        if (tg.MainButton && tg.MainButton.setParams) {
          tg.MainButton.setParams({
            color: p.button_color || "#676d79",
            text_color: p.button_text_color || "#ffffff",
          });
        }
      } catch (_) {}
      try {
        if (tg.SecondaryButton && tg.SecondaryButton.setParams) {
          tg.SecondaryButton.setParams({
            color: p.secondary_bg_color || "#2f3340",
            text_color: p.text_color || "#f3f4f7",
          });
        }
      } catch (_) {}
    }

    function applyTelegramViewport() {
      if (!tg) return;
      const contentInset = tg.contentSafeAreaInset || tg.safeAreaInset || {};
      setCssVar("--safe-top", `${Number(contentInset.top || 0)}px`);
      setCssVar("--safe-right", `${Number(contentInset.right || 0)}px`);
      setCssVar("--safe-bottom", `${Number(contentInset.bottom || 0)}px`);
      setCssVar("--safe-left", `${Number(contentInset.left || 0)}px`);

      const h = Number(tg.viewportStableHeight || tg.viewportHeight || 0);
      if (h > 0) setCssVar("--app-height", `${h}px`);
    }

    function telegramHapticSelection() {
      try { tg?.HapticFeedback?.selectionChanged?.(); } catch (_) {}
    }

    function telegramHapticImpact() {
      try { tg?.HapticFeedback?.impactOccurred?.("light"); } catch (_) {}
    }

    function setFilter(nextFilter) {
      currentFilter = nextFilter || "all";
      document.querySelectorAll(".tab").forEach((x) => {
        const isActive = (x.dataset.filter || "all") === currentFilter;
        x.classList.toggle("active", isActive);
      });
      updateTelegramButtons();
      renderRows();
    }

    function updateTelegramButtons() {
      if (!tg) return;
      const isRoot = currentFilter === "all";

      try {
        if (isRoot) tg.BackButton.hide();
        else tg.BackButton.show();
      } catch (_) {}

      try {
        if (tg.SecondaryButton && tg.SecondaryButton.setParams) {
          tg.SecondaryButton.setParams({
            text: isRoot ? "Закрыть" : "Сбросить фильтр",
            is_visible: true,
            position: "left",
          });
        } else if (tg.SecondaryButton) {
          tg.SecondaryButton.setText(isRoot ? "Закрыть" : "Сбросить фильтр");
          tg.SecondaryButton.show();
        }
      } catch (_) {}
    }

    function initTelegramMiniApp() {
      if (!tg) return;
      tg.ready();
      tg.expand();
      applyTelegramTheme();
      applyTelegramViewport();

      try {
        const p = tg.themeParams || {};
        if (tg.MainButton && tg.MainButton.setParams) {
          tg.MainButton.setParams({
            text: "Обновить",
            is_visible: true,
            color: p.button_color || "#676d79",
            text_color: p.button_text_color || "#ffffff",
          });
        } else if (tg.MainButton) {
          tg.MainButton.setText("Обновить");
          tg.MainButton.show();
        }
      } catch (_) {}
      updateTelegramButtons();

      try {
        if (tg.isVersionAtLeast && tg.isVersionAtLeast("7.7")) {
          tg.enableVerticalSwipes();
        }
      } catch (_) {}
      try {
        if (tg.isVersionAtLeast && tg.isVersionAtLeast("8.0") && !tg.isFullscreen) {
          tg.requestFullscreen();
        }
      } catch (_) {}
      try {
        tg.onEvent("themeChanged", applyTelegramTheme);
        tg.onEvent("viewportChanged", applyTelegramViewport);
        tg.onEvent("safeAreaChanged", applyTelegramViewport);
        tg.onEvent("contentSafeAreaChanged", applyTelegramViewport);
        tg.onEvent("fullscreenChanged", applyTelegramViewport);
        tg.onEvent("activated", fetchData);
        tg.onEvent("backButtonClicked", () => {
          if (currentFilter === "all") {
            try { tg.close(); } catch (_) {}
            return;
          }
          telegramHapticSelection();
          setFilter("all");
        });
        tg.onEvent("secondaryButtonClicked", () => {
          telegramHapticSelection();
          if (currentFilter === "all") {
            try { tg.close(); } catch (_) {}
            return;
          }
          setFilter("all");
        });
        tg.onEvent("mainButtonClicked", () => {
          telegramHapticImpact();
          fetchData();
        });
      } catch (_) {}
    }

    function renderMetrics(stats) {
      const all = Number(stats.all_reviews || 0);
      const pos = Number(stats.positive_reviews || 0);
      const neg = Number(stats.negative_reviews || 0);
      const rate = Number(stats.positive_rate || 0);

      document.getElementById("mAll").textContent = all.toLocaleString("ru-RU");
      document.getElementById("mPos").textContent = pos.toLocaleString("ru-RU");
      document.getElementById("mNeg").textContent = neg.toLocaleString("ru-RU");
      document.getElementById("mRate").textContent = `${rate.toFixed(2)}%`;
    }

    function filteredRows() {
      if (currentFilter === "all") return rows;
      return rows.filter((r) => String(r.rating || "") === currentFilter);
    }

    function renderRows() {
      const list = document.getElementById("reviewsList");
      const view = filteredRows();
      if (!view.length) {
        list.innerHTML = '<div class="row"><div class="line3">Записей пока нет.</div></div>';
        return;
      }

      list.innerHTML = view.map((row) => {
        const rating = String(row.rating || "neutral");
        const cls = rating === "positive" ? "good" : (rating === "negative" ? "bad" : "mid");
        const text = String(row.review_text || "").trim();
        const extra = text ? `<div class="line3">${esc(text)}</div>` : "";
        const postUrl = String(row.post_url || "").trim();
        const photoUrl = String(row.photo_url || "").trim();
        const itemId = Number(row.purchase_id || 0);
        const productName = esc(row.product_name || "Товар");
        const productHtml = postUrl
          ? `<a class="post-link" href="${esc(postUrl)}" target="_blank" rel="noopener">${productName}</a>`
          : productName;
        const idHtml = itemId > 0 ? ` • #${itemId}` : "";
        const media = photoUrl
          ? `<details class="media"><summary>▸ Открыть фото из поста</summary><a href="${esc(photoUrl)}" target="_blank" rel="noopener"><img loading="lazy" src="${esc(photoUrl)}" alt="Фото к отзыву" /></a></details>`
          : "";
        return `
          <div class="row">
            <div class="line1">
              <div>${esc(row.user_alias || "Пользователь")}</div>
              <div>${esc(fmtDate(row.created_at))}</div>
            </div>
            <div class="line2">
              <div>${productHtml}${idHtml}</div>
              <div class="badge ${cls}">${esc(row.rating_label || rating)}</div>
            </div>
            ${extra}
            ${media}
          </div>`;
      }).join("");
    }

    function bindTabs() {
      document.querySelectorAll(".tab").forEach((btn) => {
        btn.addEventListener("click", () => {
          telegramHapticSelection();
          setFilter(btn.dataset.filter || "all");
        });
      });
    }

    async function fetchData() {
      const status = document.getElementById("statusLine");
      status.textContent = "Обновляю...";
      try {
        const response = await fetch(`./reviews.json?ts=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        rows = Array.isArray(payload.items) ? payload.items : [];
        renderMetrics(payload.stats || {});
        renderRows();
        const platform = tg && tg.platform ? ` • ${tg.platform}` : "";
        status.textContent = `Обновлено: ${fmtDate(payload.generated_at)} • Отзывов: ${rows.length}${platform}`;
      } catch (err) {
        status.textContent = `Ошибка загрузки: ${err}`;
      }
    }

    initTelegramMiniApp();
    bindTabs();
    fetchData();
    setInterval(fetchData, 30000);
  </script>
</body>
</html>
